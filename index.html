<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vibras Positivas - App Oficial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ffcc00; --secondary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8f9fa; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #map { height: 60vh; width: 100%; z-index: 1; }
        .panel { height: 40vh; background: white; z-index: 1000; padding: 15px; box-sizing: border-box; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); overflow-y: auto; }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 8px; font-family: inherit; }
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-admin { background: #343a40; color: white; font-size: 11px; margin-top: 10px; }
        .btn-outline { background: #f1f3f5; border: 1px solid #ddd; color: #444; font-size: 14px; margin-top: 5px; }
        .table-container { margin-top: 15px; border: 1px solid #eee; border-radius: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .vencido { color: var(--danger); font-weight: bold; }
        .activo { color: var(--success); font-weight: bold; }
        .btn-del { background: none; color: var(--danger); border: none; font-size: 16px; cursor: pointer; width: auto; padding: 0; }
        .btn-call { display: none; background: var(--success); color: white; text-decoration: none; text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; margin: 10px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel">
        <div id="view-start">
            <h2 style="color: var(--secondary);">Vibras Positivas 🛺</h2>
            <button class="btn-yellow" onclick="goPassenger()">PEDIR MOTO ($5.000)</button>
            <button class="btn-blue" onclick="showView('view-driver')">MODO CONDUCTOR</button>
            <button class="btn-admin" onclick="accessAdmin()">⚙️ CONFIGURACIÓN ADMIN</button>
        </div>

        <div id="view-passenger" class="hidden">
            <h2>Mapa de Motos</h2>
            <input type="text" id="dest-input" placeholder="🏁 Toca el mapa para tu destino" readonly>
            <div id="driver-name" style="text-align:center; font-weight:600; margin:5px; color: var(--secondary);"></div>
            <a id="btn-call" href="#" class="btn-call">📞 LLAMAR CONDUCTOR</a>
            <button class="btn-outline" onclick="showView('view-start')">🔙 VOLVER AL INICIO</button>
        </div>

        <div id="view-driver" class="hidden">
            <div id="driver-reg">
                <h2>Registro Conductor</h2>
                <input type="text" id="d-name" placeholder="Tu Nombre">
                <input type="text" id="d-tel" placeholder="Tu WhatsApp">
                <input type="text" id="d-plate" placeholder="Placa de la Moto">
                <button class="btn-blue" onclick="startTracking()">CONECTARSE AL MAPA</button>
                <button class="btn-outline" onclick="showView('view-start')">🔙 VOLVER AL INICIO</button>
            </div>
            <div id="driver-online" class="hidden">
                <h2 style="color: var(--success);">¡Estás en Línea! ✅</h2>
                <button id="btn-status" class="btn-yellow" onclick="toggleStatus()">MARCAR COMO OCUPADO</button>
                <button class="btn-outline" onclick="location.reload()">DESCONECTARSE</button>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <h2>Control de Suscripciones</h2>
            <input type="text" id="a-plate" placeholder="Escribir Placa a Activar">
            <button class="btn-yellow" onclick="activatePlate()">ACTIVAR 30 DÍAS</button>
            <div class="table-container">
                <table>
                    <thead><tr><th>Placa</th><th>Vence</th><th>Estado</th><th>Acción</th></tr></thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
            <button onclick="clearMap()" style="background:var(--danger); color:white; margin-top:15px; font-size:10px;">BORRAR CONEXIONES DEL MAPA</button>
            <button class="btn-outline" onclick="showView('view-start')">🔙 VOLVER AL INICIO</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6Mcmm-TBrFuTiQ0IjIHq9XD620DNsI",
            authDomain: "motoapp-e4261.firebaseapp.com",
            databaseURL: "https://motoapp-e4261-default-rtdb.firebaseio.com",
            projectId: "motoapp-e4261",
            storageBucket: "motoapp-e4261.appspot.com",
            messagingSenderId: "305221084261",
            appId: "1:305221084261:web:a9569768a356396f9a063d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([7.986, -75.193], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var motoLayer = L.layerGroup().addTo(map);

        window.onload = () => {
            if(localStorage.getItem('d-name')) document.getElementById('d-name').value = localStorage.getItem('d-name');
            if(localStorage.getItem('d-tel')) document.getElementById('d-tel').value = localStorage.getItem('d-tel');
            if(localStorage.getItem('d-plate')) document.getElementById('d-plate').value = localStorage.getItem('d-plate');
        };

        window.showView = (id) => {
            document.querySelectorAll('.panel > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.goPassenger = () => {
            showView('view-passenger');
            onValue(ref(db, 'conductores/'), (snap) => {
                motoLayer.clearLayers();
                snap.forEach(child => {
                    const d = child.val();
                    const iconUrl = d.estado === 'ocupado' 
                        ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png' 
                        : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png';
                    const icon = L.icon({ iconUrl, iconSize: [25, 41], iconAnchor: [12, 41] });
                    L.marker([d.lat, d.lng], { icon }).addTo(motoLayer).on('click', () => {
                        if(d.estado === 'disponible') {
                            document.getElementById('btn-call').href = "tel:" + d.telefono;
                            document.getElementById('btn-call').style.display = 'block';
                            document.getElementById('driver-name').innerText = "🛺 Conductor: " + d.nombre;
                        } else { alert("Moto ocupada actualmente"); }
                    });
                });
            });
        };

        map.on('click', (e) => {
            if(!document.getElementById('view-passenger').classList.contains('hidden')) {
                if(window.dest) map.removeLayer(window.dest);
                window.dest = L.marker(e.latlng, { icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-black.png', iconSize: [25, 41] }) }).addTo(map);
                document.getElementById('dest-input').value = "Destino Marcado ✅";
            }
        });

        let myPlate = "";
        let myStatus = "disponible";
        window.startTracking = async () => {
            const name = document.getElementById('d-name').value.trim();
            const tel = document.getElementById('d-tel').value.trim();
            myPlate = document.getElementById('d-plate').value.toUpperCase().trim();
            if(!name || !tel || !myPlate) return alert("Completa los datos");
            localStorage.setItem('d-name', name);
            localStorage.setItem('d-tel', tel);
            localStorage.setItem('d-plate', myPlate);
            const snap = await get(ref(db, 'usuarios_moto/' + myPlate));
            if(snap.exists() && new Date() < new Date(snap.val().vencimiento)) {
                navigator.geolocation.watchPosition(p => {
                    set(ref(db, 'conductores/' + myPlate), { nombre: name, telefono: tel, lat: p.coords.latitude, lng: p.coords.longitude, estado: myStatus });
                }, null, { enableHighAccuracy: true });
                document.getElementById('driver-reg').classList.add('hidden');
                document.getElementById('driver-online').classList.remove('hidden');
            } else { alert("Suscripción inactiva."); }
        };

        window.toggleStatus = () => {
            myStatus = myStatus === 'disponible' ? 'ocupado' : 'disponible';
            document.getElementById('btn-status').innerText = myStatus === 'disponible' ? 'MARCAR COMO OCUPADO' : 'MARCAR COMO DISPONIBLE';
            document.getElementById('btn-status').className = myStatus === 'disponible' ? 'btn-yellow' : 'btn-success';
            set(ref(db, 'conductores/' + myPlate + '/estado'), myStatus);
        };

        window.accessAdmin = () => {
            const pass = prompt("Clave de Administrador:");
            if(pass === "vp1965") { showView('view-admin'); cargarHistorial(); }
            else { alert("Clave incorrecta"); }
        };

        window.activatePlate = async () => {
            const p = document.getElementById('a-plate').value.toUpperCase().trim();
            if(!p) return alert("Escribe la placa");
            let f = new Date(); f.setDate(f.getDate() + 30);
            await set(ref(db, 'usuarios_moto/' + p), { vencimiento: f.toISOString() });
            alert("✅ Placa " + p + " activada.");
            document.getElementById('a-plate').value = "";
        };

        function cargarHistorial() {
            onValue(ref(db, 'usuarios_moto/'), (snap) => {
                const tableBody = document.getElementById('admin-table-body');
                if(!tableBody) return;
                tableBody.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                for (let placa in data) {
                    const vence = new Date(data[placa].vencimiento);
                    const hoy = new Date();
                    const dias = Math.ceil((vence - hoy) / (1000 * 60 * 60 * 24));
                    const estadoClase = dias > 0 ? "activo" : "vencido";
                    const estadoTexto = dias > 0 ? dias + " días" : "VENCIDO";
                    tableBody.innerHTML += `<tr><td>${placa}</td><td>${vence.toLocaleDateString()}</td><td class="${estadoClase}">${estadoTexto}</td><td><button class="btn-del" onclick="deletePlate('${placa}')">🗑️</button></td></tr>`;
                }
            });
        }

        window.deletePlate = async (placa) => {
            if(confirm("¿Eliminar placa " + placa + "?")) {
                await remove(ref(db, 'usuarios_moto/' + placa));
                await remove(ref(db, 'conductores/' + placa));
            }
        };

        window.clearMap = async () => { if(confirm("¿Limpiar conductores?")) { await set(ref(db, 'conductores/'), null); location.reload(); } };
    </script>
</body>
</html>
