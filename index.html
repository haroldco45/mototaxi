<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vibras Positivas - Mobile</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ffcc00; --secondary: #007bff; --success: #28a745; --danger: #dc3545; --light: #f8f9fa; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { font-family: 'Poppins', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #eee; overflow: hidden; }
        
        /* El mapa ahora es flexible: se encoge si hay mucho texto abajo */
        #map { flex: 1; min-height: 35vh; width: 100%; z-index: 1; }

        .panel { 
            background: white; 
            z-index: 1000; 
            padding: 15px; 
            border-radius: 20px 20px 0 0; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            overflow-y: auto;
            max-height: 65vh; /* Evita que tape todo el mapa */
            display: flex;
            flex-direction: column;
        }

        h2 { font-size: 1.1rem; text-align: center; margin-bottom: 10px; color: #333; }
        
        /* Inputs más compactos para celular */
        input { 
            width: 100%; padding: 10px; margin: 4px 0; 
            border: 2px solid #eee; border-radius: 10px; 
            font-size: 16px; outline: none; font-family: inherit;
        }
        
        /* Contenedor de botones para que siempre quepan */
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }

        button { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: 600; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-ws { background: #25d366; color: white; }
        .btn-back { background: #e9ecef; color: #495057; border: 1px solid #dee2e6; }
        
        /* Botón de configuración bien pequeño y discreto */
        .btn-config { background: none; color: #bbb; font-size: 10px; padding: 5px; margin-top: 5px; border: 1px dashed #ddd; }

        .table-container { width: 100%; margin-top: 8px; overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }

        .hidden { display: none !important; }

        /* AJUSTE PARA PANTALLAS PEQUEÑAS */
        @media (max-width: 380px) {
            h2 { font-size: 0.9rem; }
            button { padding: 10px; font-size: 13px; }
            input { padding: 8px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel" id="main-panel">
        
        <div id="view-start">
            <h2>Vibras Positivas 🛺</h2>
            <div class="btn-group">
                <button class="btn-yellow" onclick="goPassenger()">📍 PEDIR MOTO ($5.000)</button>
                <button class="btn-blue" onclick="showView('view-driver')">🛺 MODO CONDUCTOR</button>
                <button class="btn-config" onclick="accessAdmin()">⚙️ CONFIGURACIÓN</button>
            </div>
        </div>

        <div id="view-passenger" class="hidden">
            <h2>Buscar Placa</h2>
            <input type="text" id="search-plate" style="border: 2px solid var(--primary); text-align:center;" placeholder="PLACA (EJ: ABC12D)" oninput="searchMoto()">
            <input type="text" id="dest-input" placeholder="🏁 Destino (Toca el mapa)" readonly>
            
            <div id="driver-selection" class="hidden" style="background: #f1f8ff; padding: 10px; border-radius: 12px; margin: 8px 0;">
                <p id="driver-info" style="text-align: center; font-weight: 600; font-size: 13px; margin-bottom: 8px;"></p>
                <button class="btn-ws" id="btn-request-ws" onclick="requestMoto()">📩 PEDIR POR WHATSAPP</button>
                <button class="btn-blue" id="btn-call-direct" style="background: #444; margin-top:5px;">📞 LLAMAR</button>
            </div>
            <button class="btn-back" onclick="location.reload()">🔙 VOLVER AL INICIO</button>
        </div>

        <div id="view-driver" class="hidden">
            <div id="driver-reg">
                <h2>Registro Conductor</h2>
                <input type="text" id="d-name" placeholder="Tu Nombre">
                <input type="text" id="d-tel" placeholder="WhatsApp">
                <input type="text" id="d-plate" placeholder="Placa">
                <button class="btn-blue" onclick="startTracking()">🚀 CONECTARSE</button>
            </div>
            <div id="driver-online" class="hidden">
                <h2 style="color: var(--success);">ESTÁS ACTIVO ✅</h2>
                <button id="btn-status" class="btn-yellow" onclick="toggleStatus()">MARCAR OCUPADO</button>
                <button class="btn-blue" style="background:var(--danger);" onclick="location.reload()">DESCONECTARSE</button>
            </div>
            <button class="btn-back" style="margin-top:10px;" onclick="showView('view-start')">🔙 VOLVER AL INICIO</button>
        </div>

        <div id="view-admin" class="hidden">
            <h2>Administración</h2>
            <input type="text" id="a-plate" placeholder="Activar Placa">
            <button class="btn-yellow" onclick="activatePlate()">ACTIVAR 30 DÍAS</button>
            
            <div class="table-container">
                <table>
                    <thead><tr><th>Placa</th><th>Días</th><th></th></tr></thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
            <button class="btn-back" style="margin-top:10px;" onclick="showView('view-start')">🔙 VOLVER AL INICIO</button>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6Mcmm-TBrFuTiQ0IjIHq9XD620DNsI",
            authDomain: "motoapp-e4261.firebaseapp.com",
            databaseURL: "https://motoapp-e4261-default-rtdb.firebaseio.com",
            projectId: "motoapp-e4261",
            storageBucket: "motoapp-e4261.appspot.com",
            messagingSenderId: "305221084261",
            appId: "1:305221084261:web:a9569768a356396f9a063d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([7.986, -75.193], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var motoLayer = L.layerGroup().addTo(map);

        let driversData = {};
        let selectedDriver = null;
        let passengerPos = [7.986, -75.193];

        navigator.geolocation.getCurrentPosition(p => {
            passengerPos = [p.coords.latitude, p.coords.longitude];
            L.circle(passengerPos, { radius: 15, color: 'blue' }).addTo(map);
        });

        window.showView = (id) => {
            document.querySelectorAll('.panel > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('main-panel').scrollTop = 0;
        };

        window.goPassenger = () => {
            showView('view-passenger');
            onValue(ref(db, 'conductores/'), (snap) => {
                motoLayer.clearLayers();
                driversData = {};
                snap.forEach(child => {
                    const d = child.val();
                    driversData[child.key] = d;
                    const iconUrl = d.estado === 'ocupado' 
                        ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png' 
                        : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png';
                    const icon = L.icon({ iconUrl, iconSize: [25, 41], iconAnchor: [12, 41] });
                    L.marker([d.lat, d.lng], { icon }).addTo(motoLayer).on('click', () => selectFromMap(d, child.key));
                });
            });
        };

        function selectFromMap(d, plate) {
            selectedDriver = { ...d, placa: plate };
            document.getElementById('driver-selection').classList.remove('hidden');
            const color = d.estado === 'disponible' ? 'green' : 'red';
            document.getElementById('driver-info').innerHTML = `<span style="color:${color}">●</span> ${d.nombre} (${plate})`;
            document.getElementById('btn-call-direct').onclick = () => window.open("tel:" + d.telefono);
            document.getElementById('btn-request-ws').style.display = d.estado === 'disponible' ? 'flex' : 'none';
        }

        window.searchMoto = () => {
            const plate = document.getElementById('search-plate').value.toUpperCase().trim();
            if(driversData[plate]) {
                const d = driversData[plate];
                map.flyTo([d.lat, d.lng], 17);
                selectFromMap(d, plate);
            }
        };

        window.requestMoto = () => {
            if(!selectedDriver) return;
            const dest = document.getElementById('dest-input').value;
            const msg = `Hola ${selectedDriver.nombre}, te vi en Vibras Positivas. %0AMi ubicación: http://maps.google.com/maps?q=${passengerPos[0]},${passengerPos[1]} %0A🏁 Destino: ${dest || 'Por definir'}`;
            window.open(`https://wa.me/57${selectedDriver.telefono}?text=${encodeURIComponent(msg)}`);
        };

        map.on('click', (e) => {
            if(!document.getElementById('view-passenger').classList.contains('hidden')) {
                if(window.destMarker) map.removeLayer(window.destMarker);
                window.destMarker = L.marker(e.latlng, { icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-black.png', iconSize: [25, 41] }) }).addTo(map);
                document.getElementById('dest-input').value = "Destino Marcado ✅";
            }
        });

        // --- CONDUCTOR ---
        window.startTracking = async () => {
            const name = document.getElementById('d-name').value;
            const tel = document.getElementById('d-tel').value;
            const plate = document.getElementById('d-plate').value.toUpperCase().trim();
            const snap = await get(ref(db, 'usuarios_moto/' + plate));
            if(snap.exists() && new Date() < new Date(snap.val().vencimiento)) {
                navigator.geolocation.watchPosition(p => {
                    set(ref(db, 'conductores/' + plate), { nombre: name, telefono: tel, lat: p.coords.latitude, lng: p.coords.longitude, estado: 'disponible' });
                }, null, { enableHighAccuracy: true });
                document.getElementById('driver-reg').classList.add('hidden');
                document.getElementById('driver-online').classList.remove('hidden');
            } else { alert("Placa no activa."); }
        };

        // --- ADMIN ---
        window.accessAdmin = () => { if(prompt("Clave:") === "VP1965") { showView('view-admin'); cargarHistorial(); } };
        window.activatePlate = async () => {
            const p = document.getElementById('a-plate').value.toUpperCase().trim();
            let f = new Date(); f.setDate(f.getDate() + 30);
            await set(ref(db, 'usuarios_moto/' + p), { vencimiento: f.toISOString() });
            document.getElementById('a-plate').value = "";
        };

        function cargarHistorial() {
            onValue(ref(db, 'usuarios_moto/'), (snap) => {
                const tableBody = document.getElementById('admin-table-body');
                tableBody.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                for (let plate in data) {
                    const dias = Math.ceil((new Date(data[plate].vencimiento) - new Date()) / (1000 * 60 * 60 * 24));
                    tableBody.innerHTML += `<tr><td>${plate}</td><td>${dias}d</td><td><button style="width:auto; padding:5px; background:none; color:red;" onclick="eliminarPlaca('${plate}')">🗑️</button></td></tr>`;
                }
            });
        }
        window.eliminarPlaca = async (p) => { if(confirm("¿Borrar?")) { await remove(ref(db, 'usuarios_moto/' + p)); await remove(ref(db, 'conductores/' + p)); } };

        window.onload = () => {
            document.getElementById('d-name').value = localStorage.getItem('d-name') || '';
            document.getElementById('d-tel').value = localStorage.getItem('d-tel') || '';
            document.getElementById('d-plate').value = localStorage.getItem('d-plate') || '';
        };
    </script>
</body>
</html>
