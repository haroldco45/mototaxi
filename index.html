<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vibras Positivas - App Oficial</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ffcc00; --secondary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #f4f4f4; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: #000; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* El mapa ocupa el fondo o la mitad superior */
        #map { flex: 1; width: 100%; z-index: 1; }

        /* Panel ajustable para móvil */
        .panel { 
            position: relative;
            background: white; 
            z-index: 1000; 
            padding: 20px; 
            border-radius: 25px 25px 0 0; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.2);
            max-height: 50vh; 
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        h2 { margin: 0 0 15px 0; font-size: 1.2rem; text-align: center; color: var(--dark); }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 2px solid var(--gray); 
            border-radius: 12px; 
            font-size: 16px; /* Evita zoom automático en iPhone */
            font-family: inherit;
            outline: none;
        }

        input:focus { border-color: var(--secondary); }

        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-admin { background: #333; color: white; font-size: 12px; margin-top: 10px; opacity: 0.8; }
        
        /* Botón Volver Estilo "Atrás" */
        .btn-back { 
            background: var(--gray); 
            color: #555; 
            border: 1px solid #ddd;
            margin-top: 5px;
        }

        /* Tabla responsiva para celular */
        .table-container { 
            width: 100%; 
            margin-top: 15px; 
            overflow-x: auto; 
            border: 1px solid #eee; 
            border-radius: 12px;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: 600; }
        
        .vencido { color: var(--danger); }
        .activo { color: var(--success); }

        .btn-call { 
            background: var(--success); 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 10px;
        }

        .hidden { display: none !important; }

        /* Scrollbar estética para el panel */
        .panel::-webkit-scrollbar { width: 5px; }
        .panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel" id="main-panel">
        <div id="view-start">
            <h2 style="color: var(--secondary);">Vibras Positivas 🛺</h2>
            <button class="btn-yellow" onclick="goPassenger()">📍 PEDIR MOTO ($5.000)</button>
            <button class="btn-blue" onclick="showView('view-driver')">🛺 MODO CONDUCTOR</button>
            <button class="btn-admin" onclick="accessAdmin()">⚙️ ADMIN</button>
        </div>

        <div id="view-passenger" class="hidden">
            <h2>Motos en Caucasia</h2>
            <input type="text" id="dest-input" placeholder="¿A dónde vas? (Toca el mapa)" readonly>
            <div id="driver-info" style="margin-bottom: 10px; text-align: center; font-weight: 600;"></div>
            <a id="btn-call" href="#" class="btn-call" style="display:none;">📞 LLAMAR CONDUCTOR</a>
            <button class="btn-back" onclick="location.reload()">🔙 VOLVER AL INICIO</button>
        </div>

        <div id="view-driver" class="hidden">
            <div id="driver-reg">
                <h2>Registro de Conductor</h2>
                <input type="text" id="d-name" placeholder="Tu Nombre">
                <input type="text" id="d-tel" placeholder="WhatsApp (Sin espacios)">
                <input type="text" id="d-plate" placeholder="Placa de la Moto">
                <button class="btn-blue" onclick="startTracking()">🚀 CONECTARSE</button>
            </div>
            <div id="driver-online" class="hidden">
                <h2 style="color: var(--success);">ESTÁS EN LÍNEA ✅</h2>
                <button id="btn-status" class="btn-yellow" onclick="toggleStatus()">MARCAR OCUPADO</button>
                <button class="btn-blue" style="background:#666" onclick="location.reload()">DESCONECTARSE</button>
            </div>
            <button class="btn-back" onclick="showView('view-start')">🔙 VOLVER AL INICIO</button>
        </div>

        <div id="view-admin" class="hidden">
            <h2>Gestión de Placas</h2>
            <input type="text" id="a-plate" placeholder="Nueva Placa">
            <button class="btn-yellow" onclick="activatePlate()">ACTIVAR 30 DÍAS</button>
            
            <div class="table-container">
                <table>
                    <thead><tr><th>Placa</th><th>Días</th><th></th></tr></thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
            <button class="btn-back" onclick="showView('view-start')" style="margin-top:15px;">🔙 VOLVER</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6Mcmm-TBrFuTiQ0IjIHq9XD620DNsI",
            authDomain: "motoapp-e4261.firebaseapp.com",
            databaseURL: "https://motoapp-e4261-default-rtdb.firebaseio.com",
            projectId: "motoapp-e4261",
            storageBucket: "motoapp-e4261.appspot.com",
            messagingSenderId: "305221084261",
            appId: "1:305221084261:web:a9569768a356396f9a063d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([7.986, -75.193], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var motoLayer = L.layerGroup().addTo(map);

        window.onload = () => {
            if(localStorage.getItem('d-name')) document.getElementById('d-name').value = localStorage.getItem('d-name');
            if(localStorage.getItem('d-tel')) document.getElementById('d-tel').value = localStorage.getItem('d-tel');
            if(localStorage.getItem('d-plate')) document.getElementById('d-plate').value = localStorage.getItem('d-plate');
        };

        window.showView = (id) => {
            document.querySelectorAll('.panel > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('main-panel').scrollTop = 0;
        };

        window.goPassenger = () => {
            showView('view-passenger');
            onValue(ref(db, 'conductores/'), (snap) => {
                motoLayer.clearLayers();
                snap.forEach(child => {
                    const d = child.val();
                    const iconUrl = d.estado === 'ocupado' 
                        ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png' 
                        : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png';
                    const icon = L.icon({ iconUrl, iconSize: [25, 41], iconAnchor: [12, 41] });
                    L.marker([d.lat, d.lng], { icon }).addTo(motoLayer).on('click', () => {
                        if(d.estado === 'disponible') {
                            document.getElementById('btn-call').href = "tel:" + d.telefono;
                            document.getElementById('btn-call').style.display = 'block';
                            document.getElementById('driver-info').innerText = "🛺 " + d.nombre;
                        } else { alert("Conductor ocupado"); }
                    });
                });
            });
        };

        map.on('click', (e) => {
            if(!document.getElementById('view-passenger').classList.contains('hidden')) {
                if(window.dest) map.removeLayer(window.dest);
                window.dest = L.marker(e.latlng, { icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-black.png', iconSize: [25, 41] }) }).addTo(map);
                document.getElementById('dest-input').value = "Destino Marcado ✅";
            }
        });

        let myPlate = "";
        let myStatus = "disponible";
        window.startTracking = async () => {
            const name = document.getElementById('d-name').value.trim();
            const tel = document.getElementById('d-tel').value.trim();
            myPlate = document.getElementById('d-plate').value.toUpperCase().trim();
            if(!name || !tel || !myPlate) return alert("Completa los datos");
            
            localStorage.setItem('d-name', name);
            localStorage.setItem('d-tel', tel);
            localStorage.setItem('d-plate', myPlate);

            const snap = await get(ref(db, 'usuarios_moto/' + myPlate));
            if(snap.exists() && new Date() < new Date(snap.val().vencimiento)) {
                navigator.geolocation.watchPosition(p => {
                    set(ref(db, 'conductores/' + myPlate), { nombre: name, telefono: tel, lat: p.coords.latitude, lng: p.coords.longitude, estado: myStatus });
                }, null, { enableHighAccuracy: true });
                document.getElementById('driver-reg').classList.add('hidden');
                document.getElementById('driver-online').classList.remove('hidden');
            } else { alert("Suscripción inactiva. Contacta al Admin."); }
        };

        window.toggleStatus = () => {
            myStatus = myStatus === 'disponible' ? 'ocupado' : 'disponible';
            document.getElementById('btn-status').innerText = myStatus === 'disponible' ? 'MARCAR OCUPADO' : 'MARCAR DISPONIBLE';
            document.getElementById('btn-status').className = myStatus === 'disponible' ? 'btn-yellow' : 'btn-blue';
            set(ref(db, 'conductores/' + myPlate + '/estado'), myStatus);
        };

        window.accessAdmin = () => {
            const pass = prompt("Clave Admin:");
            if(pass === "vp1965") { showView('view-admin'); cargarHistorial(); }
            else { alert("Error"); }
        };

        window.activatePlate = async () => {
            const p = document.getElementById('a-plate').value.toUpperCase().trim();
            if(!p) return;
            let f = new Date(); f.setDate(f.getDate() + 30);
            await set(ref(db, 'usuarios_moto/' + p), { vencimiento: f.toISOString() });
            document.getElementById('a-plate').value = "";
        };

        function cargarHistorial() {
            onValue(ref(db, 'usuarios_moto/'), (snap) => {
                const tableBody = document.getElementById('admin-table-body');
                tableBody.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                for (let placa in data) {
                    const vence = new Date(data[placa].vencimiento);
                    const dias = Math.ceil((vence - new Date()) / (1000 * 60 * 60 * 24));
                    tableBody.innerHTML += `<tr><td>${placa}</td><td class="${dias>0?'activo':'vencido'}">${dias>0?dias:'Venc'}</td><td><button style="width:auto; padding:5px; background:none; color:red;" onclick="deletePlate('${placa}')">🗑️</button></td></tr>`;
                }
            });
        }

        window.deletePlate = async (placa) => {
            if(confirm("¿Eliminar " + placa + "?")) {
                await remove(ref(db, 'usuarios_moto/' + placa));
                await remove(ref(db, 'conductores/' + placa));
            }
        };
    </script>
</body>
</html>
